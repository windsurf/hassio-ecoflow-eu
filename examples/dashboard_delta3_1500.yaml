title: EcoFlow Delta 3
path: ecoflow
icon: mdi:battery-charging
type: sections
max_columns: 4
sections:
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Batterij
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_battery_level
        name: Batterij
        min: 0
        max: 100
        needle: true
        severity:
          green: 50
          yellow: 20
          red: 0
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_charge_cycles
        name: Laadcycli
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_battery_health
        name: Gezondheid
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_battery_temperature
        name: Batterij temp
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_wifi_signal
        name: WiFi signaal
      # Optional: add your own custom gauges here (e.g. grid power usage sensors)
      # - type: gauge
      #   entity: sensor.your_power_usage_sensor
      #   min: -1500
      #   max: 3000
      #   needle: true
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: Vermogen
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_total_input_power
        name: Totaal inkomend
        min: 0
        max: 2000
        needle: true
        severity:
          green: 500
          yellow: 100
          red: 0
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_total_output_power
        name: Totaal uitgaand
        min: 0
        max: 2000
        needle: true
        severity:
          green: 0
          yellow: 1000
          red: 1800
  - type: grid
    column_span: 1
    cards:
      - type: heading
        heading: AC Uitgang
      - type: tile
        entity: switch.ecoflow_delta_3_1500_ac_output
        name: AC Uitgang
      - type: tile
        entity: switch.ecoflow_delta_3_1500_x_boost
        name: X-Boost
      - type: gauge
        entity: sensor.ecoflow_delta_3_1500_ac_output_power
        name: AC Vermogen
        min: 0
        max: 1500
        needle: true
        severity:
          green: 0
          yellow: 1000
          red: 1400
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_voltage
        name: Spanning
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_current
        name: Stroom
      - type: tile
        entity: sensor.ecoflow_delta_3_1500_ac_output_frequency
